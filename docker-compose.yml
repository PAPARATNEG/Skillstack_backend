version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: skillstack-db
    environment:
      POSTGRES_USER: skillstack_user
      POSTGRES_PASSWORD: skillstack_pass
      POSTGRES_DB: skillstack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: